jobs: 1200
cores: 200   # safer cluster cap (adjust upward only if admin-confirmed)
local-cores: 1

latency-wait: 60
restart-times: 0

keep-going: true
rerun-incomplete: true
printshellcmds: true

use-conda: true

cluster: |
  mkdir -p results/slurm_logs/{rule}/ &&
  sbatch
    --exclude=node[29-36]
    --cpus-per-task={threads}
    --mem={resources.mem_mb}
    --time={resources.runtime}
    --job-name=smk-{rule}-{wildcards}
    --output=results/slurm_logs/{rule}/{rule}-%j.out
    --error=results/slurm_logs/{rule}/{rule}-%j.err
    --parsable

cluster-cancel: scancel
cluster-cancel-nargs: 1000

default-resources:
  - mem_mb=8000
  - runtime=120
  - partition="shortq7"

max-jobs-per-second: 2
max-status-checks-per-second: 10