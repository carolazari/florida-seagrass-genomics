jobs: 1200
cores: 600
local-cores: 1

latency-wait: 60
restart-times: 0

keep-going: true
rerun-incomplete: true
printshellcmds: true

use-conda: true

cluster: |
  mkdir -p results/slurm_logs/{rule} &&
  sbatch
    --exclude=node[29-36]
    --cpus-per-task={threads}
    --mem={resources.mem_mb}
    --time={resources.runtime}
    --job-name=smk-{rule}-{wildcards}
    --output=results/slurm_logs/{rule}/{rule}-%j.out
    --error=results/slurm_logs/{rule}/{rule}-%j.err
    --parsable

cluster-cancel: scancel
cluster-cancel-nargs: 1000


default-resources:
  - partition: "shortq7"      # Default queue on Athene (Max 6 hours, includes GPUs if needed); you can choose shortq7, mediumq7, or longq7 depending on the resources you need (mostly time)
  - time: "02:00:00"         # Default runtime wall clock
  - mem_mb: 8000             # Default RAM allocation (8GB)

# Keep the cluster from being choked with hundreds of jobs at once
max-jobs-per-second: 2
max-status-checks-per-second: 10
local-cores: 1
latency-wait: 60
